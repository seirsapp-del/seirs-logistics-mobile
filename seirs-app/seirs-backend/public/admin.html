<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Seirs Admin</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --primary: #F4600C; --navy: #0D1B2A; --bg: #F5F7FA; --surface: #fff;
    --text: #1a1a2e; --muted: #6b7280; --border: #e5e7eb;
    --green: #22C55E; --red: #EF4444; --blue: #3B82F6;
  }
  body { font-family: system-ui, -apple-system, sans-serif; background: var(--bg); color: var(--text); font-size: 14px; }
  a { color: var(--primary); text-decoration: none; }

  /* Layout */
  #app { display: flex; min-height: 100vh; }
  nav { width: 220px; background: var(--navy); flex-shrink: 0; display: flex; flex-direction: column; padding: 24px 0; position: fixed; top: 0; bottom: 0; }
  nav .logo { color: #fff; font-size: 18px; font-weight: 800; letter-spacing: 3px; padding: 0 20px 24px; border-bottom: 1px solid rgba(255,255,255,0.1); }
  nav .logo span { color: var(--primary); }
  nav ul { list-style: none; margin-top: 16px; flex: 1; }
  nav ul li a { display: flex; align-items: center; gap: 10px; padding: 11px 20px; color: rgba(255,255,255,0.7); font-size: 13px; transition: all 0.15s; }
  nav ul li a:hover, nav ul li a.active { background: rgba(255,255,255,0.08); color: #fff; border-left: 3px solid var(--primary); padding-left: 17px; }
  nav .signout { padding: 16px 20px; border-top: 1px solid rgba(255,255,255,0.1); }
  nav .signout button { background: none; border: none; color: rgba(255,255,255,0.5); cursor: pointer; font-size: 13px; }
  main { margin-left: 220px; flex: 1; padding: 32px; }

  /* Login */
  #login-screen { display: flex; align-items: center; justify-content: center; min-height: 100vh; background: var(--navy); }
  .login-card { background: #fff; border-radius: 12px; padding: 40px; width: 380px; }
  .login-card h1 { color: var(--primary); font-size: 24px; letter-spacing: 3px; margin-bottom: 8px; }
  .login-card p { color: var(--muted); margin-bottom: 28px; }

  /* Cards & tables */
  .page-title { font-size: 22px; font-weight: 700; margin-bottom: 24px; }
  .stats-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 16px; margin-bottom: 32px; }
  .stat-card { background: var(--surface); border-radius: 10px; padding: 20px; border: 1px solid var(--border); }
  .stat-card .val { font-size: 28px; font-weight: 800; }
  .stat-card .lbl { color: var(--muted); font-size: 12px; margin-top: 4px; }
  .card { background: var(--surface); border-radius: 10px; border: 1px solid var(--border); overflow: hidden; margin-bottom: 24px; }
  .card-header { padding: 16px 20px; border-bottom: 1px solid var(--border); font-weight: 600; display: flex; align-items: center; justify-content: space-between; }
  table { width: 100%; border-collapse: collapse; }
  th { background: var(--bg); padding: 10px 16px; text-align: left; font-size: 11px; text-transform: uppercase; letter-spacing: 0.5px; color: var(--muted); border-bottom: 1px solid var(--border); }
  td { padding: 12px 16px; border-bottom: 1px solid var(--border); vertical-align: middle; }
  tr:last-child td { border-bottom: none; }
  tr:hover td { background: #fafafa; }

  /* Badges */
  .badge { display: inline-block; padding: 2px 8px; border-radius: 100px; font-size: 11px; font-weight: 600; }
  .badge-green  { background: #dcfce7; color: #16a34a; }
  .badge-orange { background: #fff7ed; color: #ea580c; }
  .badge-red    { background: #fee2e2; color: #dc2626; }
  .badge-blue   { background: #dbeafe; color: #1d4ed8; }
  .badge-gray   { background: #f3f4f6; color: #6b7280; }

  /* Buttons */
  .btn { display: inline-flex; align-items: center; justify-content: center; padding: 8px 16px; border-radius: 6px; font-size: 13px; font-weight: 500; cursor: pointer; border: none; transition: opacity 0.15s; }
  .btn:hover { opacity: 0.85; }
  .btn-primary { background: var(--primary); color: #fff; }
  .btn-green   { background: var(--green);   color: #fff; }
  .btn-red     { background: var(--red);     color: #fff; }
  .btn-outline { background: transparent; border: 1.5px solid var(--border); color: var(--text); }
  .btn-sm { padding: 5px 10px; font-size: 12px; }

  /* Forms */
  .form-group { margin-bottom: 16px; }
  .form-group label { display: block; font-size: 12px; font-weight: 500; color: var(--muted); margin-bottom: 5px; }
  .form-group input { width: 100%; padding: 10px 14px; border: 1.5px solid var(--border); border-radius: 7px; font-size: 14px; outline: none; }
  .form-group input:focus { border-color: var(--primary); }

  /* Filters */
  .filters { display: flex; gap: 10px; margin-bottom: 16px; flex-wrap: wrap; }
  .filter-btn { padding: 6px 14px; border-radius: 100px; border: 1.5px solid var(--border); background: var(--surface); cursor: pointer; font-size: 12px; }
  .filter-btn.active { background: var(--primary); color: #fff; border-color: var(--primary); }

  /* Misc */
  .error-msg { background: #fee2e2; color: var(--red); padding: 10px 14px; border-radius: 7px; margin-bottom: 12px; font-size: 13px; }
  .muted { color: var(--muted); }
  .text-right { text-align: right; }
  .flex { display: flex; align-items: center; gap: 8px; }
  .pagination { display: flex; gap: 8px; padding: 16px 20px; justify-content: flex-end; }
  .page-btn { padding: 5px 11px; border-radius: 5px; border: 1.5px solid var(--border); background: var(--surface); cursor: pointer; font-size: 12px; }
  .page-btn.active { background: var(--primary); color: #fff; border-color: var(--primary); }
  .loading { padding: 40px; text-align: center; color: var(--muted); }
  select { padding: 8px 12px; border: 1.5px solid var(--border); border-radius: 6px; font-size: 13px; background: var(--surface); }
  .hidden { display: none !important; }
</style>
</head>
<body>

<!-- Login Screen -->
<div id="login-screen">
  <div class="login-card">
    <h1>SEIRS</h1>
    <p>Admin Dashboard — sign in to continue</p>
    <div id="login-error" class="error-msg hidden"></div>
    <div class="form-group">
      <label>Email</label>
      <input id="login-email" type="email" placeholder="admin@seirs.co" />
    </div>
    <div class="form-group">
      <label>Password</label>
      <input id="login-password" type="password" placeholder="••••••••" />
    </div>
    <button class="btn btn-primary" style="width:100%;height:44px" onclick="doLogin()">Sign In</button>
  </div>
</div>

<!-- App Shell (hidden until logged in) -->
<div id="app" class="hidden">
  <nav>
    <div class="logo">SEI<span>RS</span></div>
    <ul>
      <li><a href="#" onclick="showTab('stats')" id="nav-stats">📊 Dashboard</a></li>
      <li><a href="#" onclick="showTab('drivers')" id="nav-drivers">🚗 Drivers</a></li>
      <li><a href="#" onclick="showTab('deliveries')" id="nav-deliveries">📦 Deliveries</a></li>
      <li><a href="#" onclick="showTab('users')" id="nav-users">👥 Users</a></li>
    </ul>
    <div class="signout">
      <button onclick="logout()">⬅ Sign Out</button>
    </div>
  </nav>
  <main id="main-content"></main>
</div>

<script>
// ── Config ───────────────────────────────────────────────────────────────────
const API = '/api/v1';
let token = localStorage.getItem('seirs_admin_token') || '';
let currentTab = 'stats';

// ── Helpers ──────────────────────────────────────────────────────────────────
async function api(method, path, body) {
  const res = await fetch(API + path, {
    method,
    headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
    body: body ? JSON.stringify(body) : undefined,
  });
  if (res.status === 401) { logout(); return null; }
  const data = await res.json().catch(() => ({}));
  if (!res.ok) throw new Error(data.message || 'Request failed');
  return data;
}

function statusBadge(status) {
  const map = {
    pending:    'badge-orange', assigned:  'badge-blue',
    picked_up:  'badge-blue',   in_transit:'badge-blue',
    delivered:  'badge-green',  cancelled: 'badge-gray',
    failed:     'badge-red',    approved:  'badge-green',
    rejected:   'badge-red',    suspended: 'badge-red',
    active:     'badge-green',
  };
  return `<span class="badge ${map[status] ?? 'badge-gray'}">${status}</span>`;
}

function fmtDate(d) { return d ? new Date(d).toLocaleDateString('en-NG', { day:'numeric',month:'short',year:'numeric' }) : '—'; }
function fmtMoney(n) { return n != null ? '₦' + Number(n).toLocaleString() : '—'; }
function set(id, html) { const el = document.getElementById(id); if (el) el.innerHTML = html; }

// ── Auth ─────────────────────────────────────────────────────────────────────
async function doLogin() {
  const email    = document.getElementById('login-email').value.trim();
  const password = document.getElementById('login-password').value;
  const errEl    = document.getElementById('login-error');
  errEl.classList.add('hidden');
  try {
    const res = await fetch(API + '/auth/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email, password }),
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.message || 'Login failed');
    if (data.user?.role !== 'admin') throw new Error('Access denied — not an admin account.');
    token = data.token;
    localStorage.setItem('seirs_admin_token', token);
    document.getElementById('login-screen').classList.add('hidden');
    document.getElementById('app').classList.remove('hidden');
    showTab('stats');
  } catch (e) {
    errEl.textContent = e.message;
    errEl.classList.remove('hidden');
  }
}

function logout() {
  token = '';
  localStorage.removeItem('seirs_admin_token');
  document.getElementById('app').classList.add('hidden');
  document.getElementById('login-screen').classList.remove('hidden');
}

// Check if already logged in
if (token) {
  document.getElementById('login-screen').classList.add('hidden');
  document.getElementById('app').classList.remove('hidden');
  setTimeout(() => showTab('stats'), 0);
}

document.addEventListener('keydown', e => {
  if (e.key === 'Enter' && document.getElementById('login-password') === document.activeElement) doLogin();
});

// ── Tab routing ──────────────────────────────────────────────────────────────
function showTab(tab) {
  currentTab = tab;
  document.querySelectorAll('nav ul li a').forEach(a => a.classList.remove('active'));
  const active = document.getElementById('nav-' + tab);
  if (active) active.classList.add('active');
  const content = document.getElementById('main-content');
  content.innerHTML = '<div class="loading">Loading...</div>';
  const loaders = { stats: loadStats, drivers: loadDrivers, deliveries: loadDeliveries, users: loadUsers };
  (loaders[tab] || loadStats)();
  return false;
}

// ── Dashboard Stats ──────────────────────────────────────────────────────────
async function loadStats() {
  const data = await api('GET', '/admin/stats');
  if (!data) return;
  const d = data;

  document.getElementById('main-content').innerHTML = `
    <div class="page-title">Dashboard</div>
    <div class="stats-grid">
      <div class="stat-card"><div class="val">${d.users.total}</div><div class="lbl">Total Customers</div></div>
      <div class="stat-card"><div class="val">${d.drivers.total}</div><div class="lbl">Total Drivers</div></div>
      <div class="stat-card"><div class="val" style="color:var(--primary)">${d.drivers.pendingKyc}</div><div class="lbl">Pending KYC</div></div>
      <div class="stat-card"><div class="val">${d.deliveries.total}</div><div class="lbl">Total Deliveries</div></div>
      <div class="stat-card"><div class="val" style="color:var(--blue)">${d.deliveries.active}</div><div class="lbl">Active Now</div></div>
      <div class="stat-card"><div class="val">${d.deliveries.today}</div><div class="lbl">Today</div></div>
      <div class="stat-card"><div class="val" style="color:var(--green)">${fmtMoney(d.revenue.total)}</div><div class="lbl">Total Revenue</div></div>
      <div class="stat-card"><div class="val" style="color:var(--primary)">${fmtMoney(d.revenue.commission)}</div><div class="lbl">Platform Fee (20%)</div></div>
    </div>
    ${d.drivers.pendingKyc > 0 ? `
    <div class="card">
      <div class="card-header">⚠️ Drivers pending KYC approval
        <button class="btn btn-primary btn-sm" onclick="showTab('drivers')">Review →</button>
      </div>
    </div>` : ''}
  `;
}

// ── Drivers ──────────────────────────────────────────────────────────────────
let driversFilter = '';
let driversPage = 1;

async function loadDrivers() {
  const query = driversFilter ? `?status=${driversFilter}&page=${driversPage}` : `?page=${driversPage}`;
  const data = await api('GET', '/admin/drivers' + query);
  if (!data) return;

  document.getElementById('main-content').innerHTML = `
    <div class="page-title">Drivers</div>
    <div class="filters">
      ${['', 'pending', 'approved', 'rejected', 'suspended'].map(s =>
        `<button class="filter-btn ${driversFilter===s?'active':''}" onclick="setDriverFilter('${s}')">${s||'All'}</button>`
      ).join('')}
    </div>
    <div class="card">
      <table>
        <thead><tr>
          <th>Name</th><th>Phone</th><th>Vehicle</th><th>KYC Status</th><th>Rating</th><th>Joined</th><th>Actions</th>
        </tr></thead>
        <tbody>
          ${data.drivers.length === 0 ? '<tr><td colspan="7" class="loading muted">No drivers found</td></tr>' :
            data.drivers.map(d => `
            <tr>
              <td><strong>${d.user?.name ?? '—'}</strong><br><span class="muted" style="font-size:11px">${d.user?.email ?? ''}</span></td>
              <td>${d.user?.phone ?? '—'}</td>
              <td>${d.vehicleType ?? '—'}</td>
              <td>${statusBadge(d.status)}</td>
              <td>⭐ ${Number(d.rating).toFixed(1)}</td>
              <td>${fmtDate(d.createdAt)}</td>
              <td class="flex">
                ${d.status !== 'approved'  ? `<button class="btn btn-green btn-sm" onclick="driverAction('${d.id}','approve')">Approve</button>` : ''}
                ${d.status !== 'suspended' ? `<button class="btn btn-red btn-sm"   onclick="driverAction('${d.id}','suspend')">Suspend</button>` : ''}
              </td>
            </tr>`).join('')}
        </tbody>
      </table>
      <div class="pagination">
        <span class="muted" style="font-size:12px;margin-right:auto">${data.total} drivers</span>
        ${driversPage > 1 ? `<button class="page-btn" onclick="driversPage--;loadDrivers()">← Prev</button>` : ''}
        ${data.total > driversPage * 20 ? `<button class="page-btn" onclick="driversPage++;loadDrivers()">Next →</button>` : ''}
      </div>
    </div>
  `;
}

function setDriverFilter(f) { driversFilter = f; driversPage = 1; loadDrivers(); }

async function driverAction(id, action) {
  if (!confirm(`${action} this driver?`)) return;
  await api('PATCH', `/admin/drivers/${id}/${action}`);
  loadDrivers();
}

// ── Deliveries ───────────────────────────────────────────────────────────────
let deliveriesFilter = '';
let deliveriesPage = 1;

async function loadDeliveries() {
  const query = deliveriesFilter
    ? `?status=${deliveriesFilter}&page=${deliveriesPage}`
    : `?page=${deliveriesPage}`;
  const data = await api('GET', '/admin/deliveries' + query);
  if (!data) return;

  document.getElementById('main-content').innerHTML = `
    <div class="page-title">Deliveries</div>
    <div class="filters">
      ${['', 'pending', 'assigned', 'in_transit', 'delivered', 'cancelled', 'failed'].map(s =>
        `<button class="filter-btn ${deliveriesFilter===s?'active':''}" onclick="setDeliveryFilter('${s}')">${s||'All'}</button>`
      ).join('')}
    </div>
    <div class="card">
      <table>
        <thead><tr>
          <th>Tracking</th><th>Customer</th><th>Driver</th><th>Status</th><th>Price</th><th>Distance</th><th>Date</th><th>Actions</th>
        </tr></thead>
        <tbody>
          ${data.deliveries.length === 0 ? '<tr><td colspan="8" class="loading muted">No deliveries found</td></tr>' :
            data.deliveries.map(d => `
            <tr>
              <td><strong>${d.trackingCode}</strong></td>
              <td>${d.customer?.name ?? '—'}</td>
              <td>${d.driver?.user?.name ?? '<span class="muted">Unassigned</span>'}</td>
              <td>${statusBadge(d.status)}</td>
              <td>${fmtMoney(d.price)}</td>
              <td>${d.distanceKm ? Number(d.distanceKm).toFixed(1) + ' km' : '—'}</td>
              <td>${fmtDate(d.createdAt)}</td>
              <td>
                ${d.status !== 'cancelled' && d.status !== 'delivered'
                  ? `<button class="btn btn-red btn-sm" onclick="cancelDelivery('${d.id}')">Cancel</button>`
                  : ''}
              </td>
            </tr>`).join('')}
        </tbody>
      </table>
      <div class="pagination">
        <span class="muted" style="font-size:12px;margin-right:auto">${data.total} deliveries</span>
        ${deliveriesPage > 1 ? `<button class="page-btn" onclick="deliveriesPage--;loadDeliveries()">← Prev</button>` : ''}
        ${data.total > deliveriesPage * 20 ? `<button class="page-btn" onclick="deliveriesPage++;loadDeliveries()">Next →</button>` : ''}
      </div>
    </div>
  `;
}

function setDeliveryFilter(f) { deliveriesFilter = f; deliveriesPage = 1; loadDeliveries(); }

async function cancelDelivery(id) {
  if (!confirm('Cancel this delivery?')) return;
  await api('PATCH', `/admin/deliveries/${id}/cancel`);
  loadDeliveries();
}

// ── Users ────────────────────────────────────────────────────────────────────
let usersPage = 1;

async function loadUsers() {
  const data = await api('GET', `/admin/users?page=${usersPage}`);
  if (!data) return;

  document.getElementById('main-content').innerHTML = `
    <div class="page-title">Users</div>
    <div class="card">
      <table>
        <thead><tr>
          <th>Name</th><th>Email</th><th>Phone</th><th>Role</th><th>Joined</th><th>Actions</th>
        </tr></thead>
        <tbody>
          ${data.users.length === 0 ? '<tr><td colspan="6" class="loading muted">No users found</td></tr>' :
            data.users.map(u => `
            <tr>
              <td><strong>${u.name}</strong></td>
              <td>${u.email}</td>
              <td>${u.phone ?? '—'}</td>
              <td>${statusBadge(u.role ?? 'customer')}</td>
              <td>${fmtDate(u.createdAt)}</td>
              <td>
                ${u.role !== 'admin'
                  ? `<button class="btn btn-outline btn-sm" onclick="toggleUser('${u.id}', ${!u.isActive})">${u.isActive === false ? 'Activate' : 'Deactivate'}</button>`
                  : ''}
              </td>
            </tr>`).join('')}
        </tbody>
      </table>
      <div class="pagination">
        <span class="muted" style="font-size:12px;margin-right:auto">${data.total} users</span>
        ${usersPage > 1 ? `<button class="page-btn" onclick="usersPage--;loadUsers()">← Prev</button>` : ''}
        ${data.total > usersPage * 20 ? `<button class="page-btn" onclick="usersPage++;loadUsers()">Next →</button>` : ''}
      </div>
    </div>
  `;
}

async function toggleUser(id, active) {
  await api('PATCH', `/admin/users/${id}`, { isActive: active });
  loadUsers();
}
</script>
</body>
</html>
